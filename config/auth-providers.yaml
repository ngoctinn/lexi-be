AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  External Identity Providers (Google OAuth).
  This is a STANDALONE stack. Deploy AFTER auth-base stack.
  Requires Google OAuth credentials in SSM Parameter Store.
  IMPORTANT: After deployment, run CLI command from Outputs to update App Client.

Parameters:
  AuthBaseStackName:
    Type: String
    Default: lexi-auth-base
    Description: Name of the auth-base stack to import Cognito resources from

  GoogleClientIdParameter:
    Type: String
    Default: /lexi/auth/google/client_id
    Description: SSM Parameter Store path for Google OAuth Client ID

  GoogleClientSecretParameter:
    Type: String
    Default: /lexi/auth/google/client_secret
    Description: SSM Parameter Store path for Google OAuth Client Secret

Resources:
  # --- GOOGLE IDENTITY PROVIDER ---
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId:
        Fn::ImportValue: !Sub "${AuthBaseStackName}-UserPoolId"
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Sub "{{resolve:ssm:${GoogleClientIdParameter}}}"
        client_secret: !Sub "{{resolve:ssm:${GoogleClientSecretParameter}}}"
        authorize_scopes: "email profile openid"
      AttributeMapping:
        email: email
        name: name
        picture: picture

Outputs:
  GoogleProviderName:
    Description: "Google Identity Provider Name"
    Value: !Ref GoogleIdentityProvider
    Export:
      Name: !Sub "${AWS::StackName}-GoogleProviderName"

  UpdateClientCommand:
    Description: "CLI command to add Google provider to App Client"
    Value: !Sub |
      # Get Client ID from auth-base stack exports
      CLIENT_ID=$(aws cloudformation list-exports --query "Exports[?Name=='${AuthBaseStackName}-UserPoolClientId'].Value" --output text --region ${AWS::Region})
      USER_POOL_ID=$(aws cloudformation list-exports --query "Exports[?Name=='${AuthBaseStackName}-UserPoolId'].Value" --output text --region ${AWS::Region})
      
      # Update client to support Google
      aws cognito-idp update-user-pool-client \
        --user-pool-id $USER_POOL_ID \
        --client-id $CLIENT_ID \
        --supported-identity-providers COGNITO Google \
        --region ${AWS::Region}

  SetupInstructions:
    Description: "Setup instructions for Google OAuth"
    Value: |
      1. Create Google OAuth credentials at https://console.cloud.google.com/apis/credentials
      2. Add authorized redirect URIs:
         - https://<domain>.auth.<region>.amazoncognito.com/oauth2/idpresponse
      3. Store credentials in SSM Parameter Store:
         aws ssm put-parameter --name /lexi/auth/google/client_id --value "YOUR_CLIENT_ID" --type String
         aws ssm put-parameter --name /lexi/auth/google/client_secret --value "YOUR_CLIENT_SECRET" --type SecureString
      4. Deploy auth stack with DeployGoogleProvider=true
      5. Run the UpdateClientCommand from outputs
