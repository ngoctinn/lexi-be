AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  Hạ tầng xác thực Amazon Cognito cho LexiApp.
  Cấu hình User Pool, Client và logic hậu đăng ký (Post Confirmation).

Parameters:
  TableName:
    Type: String
    Description: Tên bảng DynamoDB để lưu User Profile
    Default: LexiApp
  TableArn:
    Type: String
    Description: ARN của bảng DynamoDB để cấp quyền cho Lambda
    Default: arn:aws:dynamodb:ap-southeast-1:826229823693:table/LexiApp

Resources:
  # --- 1. COGNITO USER POOL ---
  LexiUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: LexiUserPool
      # Tự động xác thực qua email để tiện lợi cho người dùng và Frontend
      AutoVerifiedAttributes:
        - email
      # Cấu hình login bằng email thay vì username
      UsernameAttributes:
        - email

      # Quy định độ mạnh mật khẩu (Security best practice)
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
          RequireUppercase: false

      # Các thuộc tính tùy chỉnh: (Đã dọn dẹp, chuyển hết sang Database Profile)
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: false
          Required: true

      # Lambda Triggers will be added via CLI after deployment to avoid circular dependency
      # aws cognito-idp update-user-pool --user-pool-id <pool-id> \
      #   --lambda-config PreSignUp=<arn>,PostConfirmation=<arn> --region ap-southeast-1

  # --- 3. COGNITO APP CLIENT ---
  LexiUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: GoogleIdentityProvider
    Properties:
      UserPoolId: !Ref LexiUserPool
      ClientName: LexiWebClient
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      ReadAttributes:
        - email
        - name
        - picture
      WriteAttributes:
        - email
        - name
        - picture
      # Bây giờ có thể add Google vì GoogleIdentityProvider đã tạo trước
      SupportedIdentityProviders:
        - COGNITO
        - Google
      AllowedOAuthFlows:
        - code
        - implicit
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      CallbackURLs:
        - http://localhost:3000/oauth-callback
        - https://ngoctin.me/oauth-callback
      LogoutURLs:
        - http://localhost:3000
        - https://ngoctin.me
      AllowedOAuthFlowsUserPoolClient: true

  # --- 4. COGNITO DOMAIN ---
  LexiUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "lexi-auth-${AWS::AccountId}"
      UserPoolId: !Ref LexiUserPool

  # --- 5. GOOGLE IDENTITY PROVIDER ---
  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    DependsOn: LexiUserPoolDomain
    Properties:
      UserPoolId: !Ref LexiUserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Sub '{{resolve:ssm:/lexi/auth/google/client_id}}'
        client_secret: !Sub '{{resolve:ssm:/lexi/auth/google/client_secret}}'
        authorize_scopes: 'email profile openid'
      AttributeMapping:
        email: email
        name: name
        picture: picture

  # --- 6. PRE SIGN-UP LAMBDA ---
  # Link federated users (Google) to existing email/password accounts
  PreSignUpLambda:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/
      Handler: infrastructure.handlers.auth.pre_signup_handler.handler
      Runtime: python3.12
      Timeout: 10
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref LexiUserPool
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
                - cognito-idp:AdminLinkProviderForUser
              Resource: !GetAtt LexiUserPool.Arn
    Metadata:
      BuildMethod: python3.12

  PreSignUpLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PreSignUpLambda.Arn
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt LexiUserPool.Arn

  # --- 7. POST CONFIRMATION LAMBDA ---
  # Create user profile in DynamoDB after successful sign-up
  PostConfirmationLambda:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../src/
      Handler: infrastructure.handlers.auth.post_confirmation_handler.handler
      Runtime: python3.12
      Timeout: 10
      Environment:
        Variables:
          LEXI_TABLE_NAME: !Ref TableName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TableName
    Metadata:
      BuildMethod: python3.12

  PostConfirmationLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt PostConfirmationLambda.Arn
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt LexiUserPool.Arn

  # --- 7. COGNITO IDENTITY POOL (sẽ add sau khi User Pool + Lambda đã deploy) ---
  # LexiIdentityPool:
  #   Type: AWS::Cognito::IdentityPool
  #   Properties:
  #     IdentityPoolName: LexiIdentityPool
  #     AllowUnauthenticatedIdentities: false
  #     CognitoIdentityProviders:
  #       - ClientId: !Ref LexiUserPoolClient
  #         ProviderName: !GetAtt LexiUserPool.ProviderName

  # # --- 8. IAM ROLE FOR AUTHENTICATED COGNITO USERS ---
  # CognitoAuthenticatedRole:
  #   Type: AWS::IAM::Role
  #   Properties:
  #     AssumeRolePolicyDocument:
  #       Version: '2012-10-17'
  #       Statement:
  #         - Effect: Allow
  #           Principal:
  #             Federated: cognito-identity.amazonaws.com
  #           Action: sts:AssumeRoleWithWebIdentity
  #           Condition:
  #             StringEquals:
  #               cognito-identity.amazonaws.com:aud: !Ref LexiIdentityPool
  #             ForAnyValue:StringLike:
  #               cognito-identity.amazonaws.com:amr: authenticated
  #     Policies:
  #       - PolicyName: TranscribeStreamingAccess
  #         PolicyDocument:
  #           Version: '2012-10-17'
  #           Statement:
  #             - Effect: Allow
  #               Action:
  #                 - transcribe:StartStreamTranscription
  #                 - transcribe:StartStreamTranscriptionWebSocket
  #               Resource: '*'

  # # --- 9. ATTACH ROLE TO IDENTITY POOL ---
  # IdentityPoolRoleAttachment:
  #   Type: AWS::Cognito::IdentityPoolRoleAttachment
  #   Properties:
  #     IdentityPoolId: !Ref LexiIdentityPool
  #     Roles:
  #       authenticated: !GetAtt CognitoAuthenticatedRole.Arn

Outputs:
  UserPoolArn:
    Description: "ARN của User Pool để gắn vào API Gateway"
    Value: !GetAtt LexiUserPool.Arn

  UserPoolId:
    Description: "ID của User Pool"
    Value: !Ref LexiUserPool

  # UserPoolClientId:
  #   Description: "Client ID để Frontend tích hợp"
  #   Value: !Ref LexiUserPoolClient

  # LoginUrl:
  #   Description: "Link vào trang Login để lấy Token nhanh (cần add Domain trước)"
  #   Value: !Sub "https://lexi-auth-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${LexiUserPoolClient}&response_type=token&scope=email+openid+profile&redirect_uri=https://example.com"

  UserPoolClientId:
    Description: "Client ID để Frontend tích hợp"
    Value: !Ref LexiUserPoolClient

  UserPoolDomain:
    Description: "Domain cho Hosted UI"
    Value: !Ref LexiUserPoolDomain

  LoginUrl:
    Description: "Link vào trang Login"
    Value: !Sub "https://${LexiUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${LexiUserPoolClient}&response_type=code&scope=email+openid+profile&redirect_uri=http://localhost:3000/oauth-callback"

  PreSignUpLambdaArn:
    Description: "ARN của PreSignUp Lambda để add trigger sau"
    Value: !GetAtt PreSignUpLambda.Arn

  PostConfirmationLambdaArn:
    Description: "ARN của PostConfirmation Lambda để add trigger sau"
    Value: !GetAtt PostConfirmationLambda.Arn

  # IdentityPoolId:
  #   Description: "ID của Identity Pool cho client-side AWS SDK"
  #   Value: !Ref LexiIdentityPool
