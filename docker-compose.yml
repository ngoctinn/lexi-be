version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    container_name: lexi-localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=ap-southeast-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SERVICES=dynamodb,s3,lambda,apigateway,cognito-idp,iam,logs,xray,comprehend,polly,bedrock,transcribe
      - LAMBDA_EXECUTOR=docker
      - LAMBDA_DOCKER_NETWORK=lexi-network
      - ENFORCE_IAM_POLICIES=false
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - lexi-network
    healthcheck:
      test: ["CMD", "awslocal", "kinesis", "list-streams"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  lexi-network:
    driver: bridge
