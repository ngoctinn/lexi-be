AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description:
  lexi-be — LexiLearn AI Speaking Practice Platform (Serverless)

Resources:
  PostConfirmationStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TemplateURL: functions/post_confirmation.yaml

  CognitoStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: PostConfirmationStack
    Properties:
      TemplateURL: cognito.yaml

  AuthStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL: functions/auth.yaml
      Parameters:
        UserPoolArn: !GetAtt CognitoStack.Outputs.UserPoolArn
        CognitoClientId: !GetAtt CognitoStack.Outputs.ClientId

  HelloWorldStack:
    Type: AWS::CloudFormation::Stack
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TemplateURL: functions/hello_world.yaml
      Parameters:
        UserPoolArn: !GetAtt CognitoStack.Outputs.UserPoolArn

  LexiAppTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: LexiApp
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: EntityType
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1-UserEntity-Time
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - EntityType
              - scenario
              - my_character
              - ai_character
              - ai_gender
              - level
              - status
              - total_turns
              - new_words_count
              - overall_score
              - word
              - next_review_at
              - created_at
              - updated_at
        - IndexName: GSI2-SRS-ReviewQueue
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - EntityType
              - word
              - word_type
              - definition_vi
              - phonetic
              - audio_s3_key
              - example_sentence
              - review_count
              - easiness_factor
              - interval_days
              - difficulty
              - last_reviewed_at
              - next_review_at
        - IndexName: GSI3-Admin-EntityList
          KeySchema:
            - AttributeName: EntityType
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - email
              - display_name
              - role
              - is_active
              - title
              - recommended_level
              - usage_count






Outputs:
  AuthApiUrl:
    Description: "Auth API URL"
    Value: !GetAtt AuthStack.Outputs.AuthApiUrl
  HelloApiUrl:
    Description: "Hello World API URL"
    Value: !GetAtt HelloWorldStack.Outputs.HelloApiUrl
  CognitoUserPoolId:
    Description: "Cognito User Pool ID"
    Value: !GetAtt CognitoStack.Outputs.UserPoolId
  CognitoClientId:
    Description: "Cognito Client ID"
    Value: !GetAtt CognitoStack.Outputs.ClientId

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    Environment:
      Variables:
        TABLE_NAME: LexiApp
        WORD_CACHE_TABLE: WordCache
        AUDIO_BUCKET: lexi-audio
        DICT_BUCKET: lexi-dict

# ---------------------------------------------------------------------------
# NOTE ON TIMEOUTS:
#   Each function has an explicit timeout matching its workload.
#   DO NOT use a global Timeout here — workloads differ significantly.
#
#   fn_ws_conversation_handler : 29s  (API GW WebSocket max integration timeout)
#   fn_scoring_worker           : 90s  (Bedrock Claude 3 Sonnet inference)
#   fn_word_lookup_handler      : 15s  (Oxford API + Polly + S3)
#   fn_session_handler          : 10s  (DynamoDB CRUD)
#   fn_flashcard_handler        : 10s  (DynamoDB CRUD)
#   fn_profile_handler          : 10s  (DynamoDB CRUD)
#   fn_presigned_url_handler    :  5s  (S3 presign only)
#   fn_ws_auth_handler          :  5s  (JWT verify only)
# ---------------------------------------------------------------------------
  # Placeholder — individual functions will be added here.
  # Each function must define its own Timeout property explicitly.
