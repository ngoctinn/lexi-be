AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "Template ch\xEDnh cho d\u1EF1 \xE1n Lexi-BE. Qu\u1EA3n l\xFD vi\u1EC7\
  c nh\xFAng c\xE1c module h\u1EA1 t\u1EA7ng v\xE0 \u0111\u1ECBnh ngh\u0129a API Gateway\
  \ trung t\xE2m.\n"
Resources:
  DatabaseModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: https://s3.ap-southeast-1.amazonaws.com/lexi-be-deploy-533590176362-ap-southeast-1/bb4518b635a42af241668a0b2d3f57fa.template
    Metadata:
      SamResourceId: DatabaseModule
  AuthModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: https://s3.ap-southeast-1.amazonaws.com/lexi-be-deploy-533590176362-ap-southeast-1/64004bc86ca09558aa8bac4aebaf75b5.template
      Parameters:
        TableName:
          Fn::GetAtt:
          - DatabaseModule
          - Outputs.LexiAppTableName
        TableArn:
          Fn::GetAtt:
          - DatabaseModule
          - Outputs.LexiAppTableArn
    Metadata:
      SamResourceId: AuthModule
  LexiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: MyCognitoAuthorizer
        Authorizers:
          MyCognitoAuthorizer:
            UserPoolArn:
              Fn::GetAtt:
              - AuthModule
              - Outputs.UserPoolArn
            Identity:
              Header: Authorization
    Metadata:
      SamResourceId: LexiApi
  SpeakingWebSocketApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      StageName: Prod
      RouteSelectionExpression: $request.body.action
      Auth:
        AuthType: NONE
      Routes:
        $connect:
          FunctionArn:
            Fn::GetAtt:
            - SpeakingWebSocketFunction
            - Arn
        $disconnect:
          FunctionArn:
            Fn::GetAtt:
            - SpeakingWebSocketFunction
            - Arn
        $default:
          FunctionArn:
            Fn::GetAtt:
            - SpeakingWebSocketFunction
            - Arn
    Metadata:
      SamResourceId: SpeakingWebSocketApi
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://lexi-be-deploy-533590176362-ap-southeast-1/d3f88eaa8a879754d300634274e939a4
      Handler: infrastructure.handlers.profile.get_profile_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
      Events:
        GetProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: GET
            RestApiId:
              Ref: LexiApi
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
    Metadata:
      SamResourceId: GetProfileFunction
  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://lexi-be-deploy-533590176362-ap-southeast-1/d3f88eaa8a879754d300634274e939a4
      Handler: infrastructure.handlers.profile.update_profile_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: PATCH
            RestApiId:
              Ref: LexiApi
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
    Metadata:
      SamResourceId: UpdateProfileFunction
  TranslateVocabularyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://lexi-be-deploy-533590176362-ap-southeast-1/d3f88eaa8a879754d300634274e939a4
      Handler: infrastructure.handlers.vocabulary.translate_vocabulary_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
      Events:
        TranslateVocabulary:
          Type: Api
          Properties:
            Path: /vocabulary/translate
            Method: POST
            RestApiId:
              Ref: LexiApi
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
      - Statement:
        - Effect: Allow
          Action:
          - translate:TranslateText
          Resource: '*'
    Metadata:
      SamResourceId: TranslateVocabularyFunction
  AnalyzeVocabularySentenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://lexi-be-deploy-533590176362-ap-southeast-1/d3f88eaa8a879754d300634274e939a4
      Handler: infrastructure.handlers.vocabulary.analyze_sentence_handler.handler
      Runtime: python3.12
      Events:
        AnalyzeVocabularySentence:
          Type: Api
          Properties:
            Path: /vocabulary/analyze
            Method: POST
            RestApiId:
              Ref: LexiApi
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: AnalyzeVocabularySentenceFunction
  ListScenariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://lexi-be-deploy-533590176362-ap-southeast-1/d3f88eaa8a879754d300634274e939a4
      Handler: infrastructure.handlers.scenarios_handler.handler
      Runtime: python3.12
      Events:
        ListScenarios:
          Type: Api
          Properties:
            Path: /scenarios
            Method: GET
            RestApiId:
              Ref: LexiApi
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: ListScenariosFunction
  SpeakingAudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
    Metadata:
      SamResourceId: SpeakingAudioBucket
  SpeakingWebSocketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://lexi-be-deploy-533590176362-ap-southeast-1/d3f88eaa8a879754d300634274e939a4
      Handler: infrastructure.handlers.websocket_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
          SPEAKING_AUDIO_BUCKET_NAME:
            Ref: SpeakingAudioBucket
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
      - S3CrudPolicy:
          BucketName:
            Ref: SpeakingAudioBucket
      - Statement:
        - Effect: Allow
          Action:
          - execute-api:ManageConnections
          Resource:
          - Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/@connections/*
        - Effect: Allow
          Action:
          - comprehend:DetectKeyPhrases
          - comprehend:DetectSyntax
          - polly:SynthesizeSpeech
          Resource: '*'
    Metadata:
      SamResourceId: SpeakingWebSocketFunction
  SpeakingSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: s3://lexi-be-deploy-533590176362-ap-southeast-1/d3f88eaa8a879754d300634274e939a4
      Handler: infrastructure.handlers.session_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
          SPEAKING_AUDIO_BUCKET_NAME:
            Ref: SpeakingAudioBucket
      Events:
        CreateSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: POST
            RestApiId:
              Ref: LexiApi
        ListSpeakingSessions:
          Type: Api
          Properties:
            Path: /sessions
            Method: GET
            RestApiId:
              Ref: LexiApi
        GetSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}
            Method: GET
            RestApiId:
              Ref: LexiApi
        SubmitSpeakingTurn:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/turns
            Method: POST
            RestApiId:
              Ref: LexiApi
        CompleteSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/complete
            Method: POST
            RestApiId:
              Ref: LexiApi
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Fn::GetAtt:
            - DatabaseModule
            - Outputs.LexiAppTableName
      - S3CrudPolicy:
          BucketName:
            Ref: SpeakingAudioBucket
      - Statement:
        - Effect: Allow
          Action:
          - comprehend:DetectKeyPhrases
          - comprehend:DetectSyntax
          - polly:SynthesizeSpeech
          Resource: '*'
    Metadata:
      SamResourceId: SpeakingSessionFunction
Outputs:
  Region:
    Description: AWS Region
    Value:
      Ref: AWS::Region
  ApiUrl:
    Description: "URL c\u1EE7a API Gateway"
    Value:
      Fn::Sub: https://${LexiApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  WebSocketUrl:
    Description: "URL c\u1EE7a WebSocket API"
    Value:
      Fn::Sub: wss://${SpeakingWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
  UserPoolId:
    Description: "ID c\u1EE7a Cognito User Pool"
    Value:
      Fn::GetAtt:
      - AuthModule
      - Outputs.UserPoolArn
  UserPoolClientId:
    Description: "Client ID cho \u1EE9ng d\u1EE5ng Frontend"
    Value:
      Fn::GetAtt:
      - AuthModule
      - Outputs.UserPoolClientId
