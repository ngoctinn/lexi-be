AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Main application stack for Lexi-BE.
  Imports auth resources from separate lexi-auth-base stack.
  Deploy lexi-auth-base stack BEFORE deploying this stack.

Parameters:
  AuthBaseStackName:
    Type: String
    Default: lexi-auth-base
    Description: Name of the auth-base stack to import Cognito resources from

  DatabaseStackName:
    Type: String
    Default: lexi-database
    Description: Name of the database stack to import DynamoDB table from

Resources:
  # --- 1. API GATEWAY TRUNG TÂM (Với Cognito Authorizer) ---
  # Import UserPoolArn from separate auth-base stack
  LexiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: MyCognitoAuthorizer
        Authorizers:
          MyCognitoAuthorizer:
            UserPoolArn:
              Fn::ImportValue: !Sub "${AuthBaseStackName}-UserPoolArn"
            Identity:
              Header: Authorization

  SpeakingWebSocketApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      StageName: Prod
      RouteSelectionExpression: "$request.body.action"
      Routes:
        $connect:
          FunctionArn: !GetAtt SpeakingWebSocketFunction.Arn
        $disconnect:
          FunctionArn: !GetAtt SpeakingWebSocketFunction.Arn
        $default:
          FunctionArn: !GetAtt SpeakingWebSocketFunction.Arn

  # --- 4. CÁC DỊCH VỤ (LAMBDA FUNCTIONS) ---

  # [MÔ-ĐUN ONBOARDING] - Hoàn tất thông tin ban đầu cho user mới
  CompleteOnboardingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.onboarding.complete_onboarding_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        CompleteOnboarding:
          Type: Api
          Properties:
            Path: /onboarding/complete
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  # [MÔ-ĐUN ADMIN] - Quản lý người dùng và kịch bản
  ListAdminUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.list_admin_users_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        ListAdminUsers:
          Type: Api
          Properties:
            Path: /admin/users
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  UpdateAdminUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.update_admin_user_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        UpdateAdminUser:
          Type: Api
          Properties:
            Path: /admin/users/{user_id}
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  ListAdminScenariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.list_admin_scenarios_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        ListAdminScenarios:
          Type: Api
          Properties:
            Path: /admin/scenarios
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  CreateAdminScenarioFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.create_admin_scenario_handler.handler
      Runtime: python3.12
      Timeout: 30
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        CreateAdminScenario:
          Type: Api
          Properties:
            Path: /admin/scenarios
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  UpdateAdminScenarioFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.update_admin_scenario_handler.handler
      Runtime: python3.12
      Timeout: 30
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        UpdateAdminScenario:
          Type: Api
          Properties:
            Path: /admin/scenarios/{scenario_id}
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  # [MÔ-ĐUN HỒ SƠ] - Quản lý thông tin người dùng
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.profile.get_profile_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        GetProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.profile.update_profile_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  TranslateVocabularyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.vocabulary.translate_vocabulary_handler.handler
      Runtime: python3.12
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        TranslateVocabulary:
          Type: Api
          Properties:
            Path: /vocabulary/translate
            Method: POST
            RestApiId: !Ref LexiApi
            # Cognito Authorizer is applied via DefaultAuthorizer
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
              Resource: "*"

  TranslateSentenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.vocabulary.translate_sentence_handler.handler
      Runtime: python3.12
      Timeout: 15
      Events:
        TranslateSentence:
          Type: Api
          Properties:
            Path: /vocabulary/translate-sentence
            Method: POST
            RestApiId: !Ref LexiApi
            # Cognito Authorizer is applied via DefaultAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
              Resource: "*"

  CreateFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.create_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        CreateFlashcard:
          Type: Api
          Properties:
            Path: /flashcards
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  ListDueCardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.list_due_cards_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        ListDueCards:
          Type: Api
          Properties:
            Path: /flashcards/due
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  ReviewFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.review_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        ReviewFlashcard:
          Type: Api
          Properties:
            Path: /flashcards/{flashcard_id}/review
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  ListFlashcardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.list_flashcards_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        ListFlashcards:
          Type: Api
          Properties:
            Path: /flashcards
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  GetFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.get_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        GetFlashcard:
          Type: Api
          Properties:
            Path: /flashcards/{flashcard_id}
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  UpdateFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.update_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        UpdateFlashcard:
          Type: Api
          Properties:
            Path: /flashcards/{flashcard_id}
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  DeleteFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.delete_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        DeleteFlashcard:
          Type: Api
          Properties:
            Path: /flashcards/{flashcard_id}
            Method: DELETE
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  ExportFlashcardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.export_flashcards_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        ExportFlashcards:
          Type: Api
          Properties:
            Path: /flashcards/export
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  ImportFlashcardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.import_flashcards_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        ImportFlashcards:
          Type: Api
          Properties:
            Path: /flashcards/import
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  GetStatisticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.get_statistics_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          LOG_LEVEL: INFO
      Events:
        GetStatistics:
          Type: Api
          Properties:
            Path: /flashcards/statistics
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"

  ListScenariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.scenarios_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Policies:
        - DynamoDBReadPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
      Events:
        ListScenarios:
          Type: Api
          Properties:
            Path: /scenarios
            Method: GET
            RestApiId: !Ref LexiApi
            Auth:
              Authorizer: NONE  # Public endpoint - no authentication required

  SpeakingAudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedHeaders:
              - "*"
            MaxAge: 3000
            ExposedHeaders:
              - ETag
              - x-amz-version-id

  SpeakingWebSocketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.websocket_handler.handler
      Runtime: python3.12
      Timeout: 29
      MemorySize: 512
      EphemeralStorage:
        Size: 1024
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          SPEAKING_AUDIO_BUCKET_NAME: !Ref SpeakingAudioBucket
          COGNITO_USER_POOL_ID:
            Fn::ImportValue: !Sub "${AuthBaseStackName}-UserPoolId"
          COGNITO_APP_CLIENT_ID:
            Fn::ImportValue: !Sub "${AuthBaseStackName}-UserPoolClientId"
          LOG_LEVEL: INFO
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
        - S3CrudPolicy:
            BucketName: !Ref SpeakingAudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource:
                - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/@connections/*
            - Effect: Allow
              Action:
                - comprehend:DetectKeyPhrases
                - comprehend:DetectSyntax
                - comprehend:DetectDominantLanguage
                - polly:SynthesizeSpeech
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
                - transcribe:DeleteTranscriptionJob
                - transcribe:StartStreamTranscription
                - transcribe:StartStreamTranscriptionWebSocket
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - cloudwatch:PutMetricData
              Resource: "*"

  SpeakingSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.session_handler.handler
      Runtime: python3.12
      Timeout: 29
      MemorySize: 512
      EphemeralStorage:
        Size: 1024
      Environment:
        Variables:
          LEXI_TABLE_NAME:
            Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
          SPEAKING_AUDIO_BUCKET_NAME: !Ref SpeakingAudioBucket
          LOG_LEVEL: INFO
      Events:
        CreateSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: POST
            RestApiId: !Ref LexiApi
        ListSpeakingSessions:
          Type: Api
          Properties:
            Path: /sessions
            Method: GET
            RestApiId: !Ref LexiApi
        GetSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}
            Method: GET
            RestApiId: !Ref LexiApi
        SubmitSpeakingTurn:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/turns
            Method: POST
            RestApiId: !Ref LexiApi
        CompleteSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/complete
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Fn::ImportValue: !Sub "${DatabaseStackName}-LexiAppTableName"
        - S3CrudPolicy:
            BucketName: !Ref SpeakingAudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - comprehend:DetectKeyPhrases
                - comprehend:DetectSyntax
                - polly:SynthesizeSpeech
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: "*"

  # WebSocket Lambda Permissions
  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SpeakingWebSocketFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SpeakingWebSocketApi}/*"

  WebSocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SpeakingWebSocketFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SpeakingWebSocketApi}/*"

  WebSocketDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SpeakingWebSocketFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SpeakingWebSocketApi}/*"

Outputs:
  Region:
    Description: "AWS Region"
    Value: !Ref "AWS::Region"

  ApiUrl:
    Description: "URL của API Gateway"
    Value: !Sub "https://${LexiApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"

  WebSocketUrl:
    Description: "URL của WebSocket API"
    Value: !Sub "wss://${SpeakingWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  # Note: Auth outputs (UserPoolId, UserPoolClientId) are available from lexi-auth-base stack
  # Frontend should retrieve auth config directly from lexi-auth-base stack outputs

