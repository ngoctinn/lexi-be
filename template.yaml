AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Template chính cho dự án Lexi-BE.
  Quản lý việc nhúng các module hạ tầng và định nghĩa API Gateway trung tâm.

Resources:
  # --- 1. MODULE DATABASE (DynamoDB) ---
  DatabaseModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: config/database.yaml

  # --- 2. MODULE AUTH (Cognito & PostConfirmation Logic) ---
  AuthModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: config/auth.yaml
      Parameters:
        # Truyền thông tin bảng từ DatabaseModule sang AuthModule
        TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
        TableArn: !GetAtt DatabaseModule.Outputs.LexiAppTableArn

  # --- 3. API GATEWAY TRUNG TÂM (Với Cognito Authorizer) ---
  LexiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: MyCognitoAuthorizer
        Authorizers:
          MyCognitoAuthorizer:
            UserPoolArn: !GetAtt AuthModule.Outputs.UserPoolArn
            Identity:
              Header: Authorization

  SpeakingWebSocketApi:
    Type: AWS::Serverless::WebSocketApi
    Properties:
      StageName: Prod
      RouteSelectionExpression: "$request.body.action"
      Routes:
        $connect:
          FunctionArn: !GetAtt SpeakingWebSocketFunction.Arn
        $disconnect:
          FunctionArn: !GetAtt SpeakingWebSocketFunction.Arn
        $default:
          FunctionArn: !GetAtt SpeakingWebSocketFunction.Arn

  # --- 4. CÁC DỊCH VỤ (LAMBDA FUNCTIONS) ---

  # [MÔ-ĐUN ONBOARDING] - Hoàn tất thông tin ban đầu cho user mới
  CompleteOnboardingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.onboarding.complete_onboarding_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        CompleteOnboarding:
          Type: Api
          Properties:
            Path: /onboarding/complete
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  # [MÔ-ĐUN ADMIN] - Quản lý người dùng và kịch bản
  ListAdminUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.list_admin_users_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        ListAdminUsers:
          Type: Api
          Properties:
            Path: /admin/users
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  UpdateAdminUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.update_admin_user_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        UpdateAdminUser:
          Type: Api
          Properties:
            Path: /admin/users/{user_id}
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  ListAdminScenariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.list_admin_scenarios_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        ListAdminScenarios:
          Type: Api
          Properties:
            Path: /admin/scenarios
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  CreateAdminScenarioFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.create_admin_scenario_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        CreateAdminScenario:
          Type: Api
          Properties:
            Path: /admin/scenarios
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  UpdateAdminScenarioFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.admin.update_admin_scenario_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        UpdateAdminScenario:
          Type: Api
          Properties:
            Path: /admin/scenarios/{scenario_id}
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  # [MÔ-ĐUN HỒ SƠ] - Quản lý thông tin người dùng
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.profile.get_profile_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          LOG_LEVEL: INFO
      Events:
        GetProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.profile.update_profile_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          LOG_LEVEL: INFO
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  TranslateVocabularyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.vocabulary.translate_vocabulary_handler.handler
      Runtime: python3.12
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        TranslateVocabulary:
          Type: Api
          Properties:
            Path: /vocabulary/translate
            Method: POST
            RestApiId: !Ref LexiApi
            # Cognito Authorizer is applied via DefaultAuthorizer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
              Resource: "*"

  TranslateSentenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.vocabulary.translate_sentence_handler.handler
      Runtime: python3.12
      Timeout: 15
      Events:
        TranslateSentence:
          Type: Api
          Properties:
            Path: /vocabulary/translate-sentence
            Method: POST
            RestApiId: !Ref LexiApi
            # Cognito Authorizer is applied via DefaultAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
              Resource: "*"

  CreateFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.create_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          LOG_LEVEL: INFO
      Events:
        CreateFlashcard:
          Type: Api
          Properties:
            Path: /flashcards
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  ListDueCardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.list_due_cards_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          LOG_LEVEL: INFO
      Events:
        ListDueCards:
          Type: Api
          Properties:
            Path: /flashcards/due
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  ReviewFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.review_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          LOG_LEVEL: INFO
      Events:
        ReviewFlashcard:
          Type: Api
          Properties:
            Path: /flashcards/{flashcard_id}/review
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  ListFlashcardsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.list_flashcards_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          LOG_LEVEL: INFO
      Events:
        ListFlashcards:
          Type: Api
          Properties:
            Path: /flashcards
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  GetFlashcardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.flashcard.get_flashcard_handler.handler
      Runtime: python3.12
      MemorySize: 256
      Timeout: 15
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          LOG_LEVEL: INFO
      Events:
        GetFlashcard:
          Type: Api
          Properties:
            Path: /flashcards/{flashcard_id}
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  ListScenariosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.scenarios_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        ListScenarios:
          Type: Api
          Properties:
            Path: /scenarios
            Method: GET
            RestApiId: !Ref LexiApi
            Auth:
              Authorizer: NONE  # Public endpoint - no authentication required

  SpeakingAudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedHeaders:
              - "*"
            MaxAge: 3000
            ExposedHeaders:
              - ETag
              - x-amz-version-id

  SpeakingWebSocketFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.websocket_handler.handler
      Runtime: python3.12
      Timeout: 29
      MemorySize: 512
      EphemeralStorage:
        Size: 1024
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          SPEAKING_AUDIO_BUCKET_NAME: !Ref SpeakingAudioBucket
          COGNITO_USER_POOL_ID: !GetAtt AuthModule.Outputs.UserPoolId
          COGNITO_APP_CLIENT_ID: !GetAtt AuthModule.Outputs.UserPoolClientId
          LOG_LEVEL: INFO
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
        - S3CrudPolicy:
            BucketName: !Ref SpeakingAudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource:
                - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/@connections/*
            - Effect: Allow
              Action:
                - comprehend:DetectKeyPhrases
                - comprehend:DetectSyntax
                - comprehend:DetectDominantLanguage
                - polly:SynthesizeSpeech
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
                - transcribe:DeleteTranscriptionJob
                - transcribe:StartStreamTranscription
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - cloudwatch:PutMetricData
              Resource: "*"

  SpeakingSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.session_handler.handler
      Runtime: python3.12
      Timeout: 29
      MemorySize: 512
      EphemeralStorage:
        Size: 1024
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          SPEAKING_AUDIO_BUCKET_NAME: !Ref SpeakingAudioBucket
          LOG_LEVEL: INFO
      Events:
        CreateSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: POST
            RestApiId: !Ref LexiApi
        ListSpeakingSessions:
          Type: Api
          Properties:
            Path: /sessions
            Method: GET
            RestApiId: !Ref LexiApi
        GetSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}
            Method: GET
            RestApiId: !Ref LexiApi
        SubmitSpeakingTurn:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/turns
            Method: POST
            RestApiId: !Ref LexiApi
        CompleteSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/complete
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
        - S3CrudPolicy:
            BucketName: !Ref SpeakingAudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - comprehend:DetectKeyPhrases
                - comprehend:DetectSyntax
                - polly:SynthesizeSpeech
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
              Resource: "*"

  # WebSocket Lambda Permissions
  WebSocketConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SpeakingWebSocketFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SpeakingWebSocketApi}/*"

  WebSocketDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SpeakingWebSocketFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SpeakingWebSocketApi}/*"

  WebSocketDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SpeakingWebSocketFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SpeakingWebSocketApi}/*"

Outputs:
  Region:
    Description: "AWS Region"
    Value: !Ref "AWS::Region"

  ApiUrl:
    Description: "URL của API Gateway"
    Value: !Sub "https://${LexiApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"

  WebSocketUrl:
    Description: "URL của WebSocket API"
    Value: !Sub "wss://${SpeakingWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  UserPoolId:
    Description: "ID của Cognito User Pool"
    Value: !GetAtt AuthModule.Outputs.UserPoolId

  UserPoolClientId:
    Description: "Client ID cho ứng dụng Frontend"
    Value: !GetAtt AuthModule.Outputs.UserPoolClientId

  IdentityPoolId:
    Description: "Identity Pool ID cho client-side AWS SDK"
    Value: !GetAtt AuthModule.Outputs.IdentityPoolId
