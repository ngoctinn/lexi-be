AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  # --- 1. NHÚNG FILE DATABASE ---
  DatabaseModule:
    Type: AWS::Serverless::Application
    Properties:
      # Đường dẫn tương đối từ template.yaml đến file database.yaml
      Location: config/database.yaml

  # --- 2. SỬ DỤNG TRONG LAMBDA ---
  MyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Runtime: python3.9
      
      # Truyền tên bảng vào biến môi trường của Code Python
      Environment:
        Variables:
          # Cú pháp: !GetAtt [Tên_Logic_Module].Outputs.[Tên_Output_Trong_File_Con]
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      
      # Cấp quyền cho Lambda thao tác với bảng
      Policies:
        - DynamoDBCrudPolicy:
            # Sử dụng tên bảng từ module để cấp quyền
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName