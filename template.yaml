AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Template chính cho dự án Lexi-BE.
  Quản lý việc nhúng các module hạ tầng và định nghĩa API Gateway trung tâm.

Resources:
  # --- 1. MODULE DATABASE (DynamoDB) ---
  DatabaseModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: config/database.yaml

  # --- 2. MODULE AUTH (Cognito & PostConfirmation Logic) ---
  AuthModule:
    Type: AWS::Serverless::Application
    Properties:
      Location: config/auth.yaml
      Parameters:
        # Truyền thông tin bảng từ DatabaseModule sang AuthModule
        TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
        TableArn: !GetAtt DatabaseModule.Outputs.LexiAppTableArn

  # --- 3. API GATEWAY TRUNG TÂM (Với Cognito Authorizer) ---
  LexiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        DefaultAuthorizer: MyCognitoAuthorizer
        Authorizers:
          MyCognitoAuthorizer:
            UserPoolArn: !GetAtt AuthModule.Outputs.UserPoolArn
            Identity:
              Header: Authorization

  # --- 4. CÁC DỊCH VỤ (LAMBDA FUNCTIONS) ---

  # [MÔ-ĐUN HỒ SƠ] - Quản lý thông tin người dùng
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.profile.get_profile_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        GetProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: GET
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBReadPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.profile.update_profile_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            Path: /profile
            Method: PATCH
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName

  TranslateVocabularyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.vocabulary.translate_vocabulary_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
      Events:
        TranslateVocabulary:
          Type: Api
          Properties:
            Path: /vocabulary/translate
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
        - Statement:
            - Effect: Allow
              Action:
                - translate:TranslateText
              Resource: "*"

  SpeakingAudioBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SpeakingSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: infrastructure.handlers.session_handler.handler
      Runtime: python3.12
      Environment:
        Variables:
          LEXI_TABLE_NAME: !GetAtt DatabaseModule.Outputs.LexiAppTableName
          SPEAKING_AUDIO_BUCKET_NAME: !Ref SpeakingAudioBucket
      Events:
        CreateSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions
            Method: POST
            RestApiId: !Ref LexiApi
        ListSpeakingSessions:
          Type: Api
          Properties:
            Path: /sessions
            Method: GET
            RestApiId: !Ref LexiApi
        GetSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}
            Method: GET
            RestApiId: !Ref LexiApi
        SubmitSpeakingTurn:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/turns
            Method: POST
            RestApiId: !Ref LexiApi
        CompleteSpeakingSession:
          Type: Api
          Properties:
            Path: /sessions/{session_id}/complete
            Method: POST
            RestApiId: !Ref LexiApi
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !GetAtt DatabaseModule.Outputs.LexiAppTableName
        - S3CrudPolicy:
            BucketName: !Ref SpeakingAudioBucket
        - Statement:
            - Effect: Allow
              Action:
                - comprehend:DetectKeyPhrases
                - comprehend:DetectSyntax
                - polly:SynthesizeSpeech
              Resource: "*"

Outputs:
  Region:
    Description: "AWS Region"
    Value: !Ref "AWS::Region"

  ApiUrl:
    Description: "URL của API Gateway"
    Value: !Sub "https://${LexiApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"

  UserPoolId:
    Description: "ID của Cognito User Pool"
    Value: !GetAtt AuthModule.Outputs.UserPoolArn

  UserPoolClientId:
    Description: "Client ID cho ứng dụng Frontend"
    Value: !GetAtt AuthModule.Outputs.UserPoolClientId
